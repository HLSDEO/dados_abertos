services:

  # ── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    build:
      context: ./neo4j
      dockerfile: Dockerfile    # instala GDS automaticamente na versão correta
    image: neo4j:5
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser  → http://localhost:7474
      - "7687:7687"   # Bolt     → bolt://localhost:7687
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: "2g"
      NEO4J_server_memory_heap_max__size:     "4g"
      NEO4J_server_memory_pagecache_size:     "4g"
      TZ:                America/Sao_Paulo
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/conf:/conf
      - ./neo4j/plugins:/plugins
      - ./neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI:      "bolt://neo4j:7687"
      NEO4J_USER:     "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      TZ:             America/Sao_Paulo
    volumes:
      - ./api:/app     # hot-reload em desenvolvimento

  # ── ETL ────────────────────────────────────────────────────────────────────
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: etl
    restart: "no"          # não reinicia automaticamente
    profiles: ["etl"]      # só sobe se chamado explicitamente
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI:      "bolt://neo4j:7687"
      NEO4J_USER:     "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      CHUNK_SIZE:        "${CHUNK_SIZE:-200000}"
      WORKERS:           "${WORKERS:-4}"
      NEO4J_BATCH:       "${NEO4J_BATCH:-2000}"
      PIPELINE_WORKERS:  "${PIPELINE_WORKERS:-2}"
      TZ:                America/Sao_Paulo
    volumes:
      - ./etl/data:/app/data     # monta etl/data/ do host em /app/data no container
    shm_size: '4gb'        # /dev/shm para extração de ZIPs em RAM
volumes:
  neo4j_data:
  neo4j_logs: