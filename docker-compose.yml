services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  neo4j:
    build:
      context: ./neo4j
      dockerfile: Dockerfile
    image: neo4j:5
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_db_transaction_timeout: "${NEO4J_TRANSACTION_TIMEOUT:-120s}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL_SIZE:-1g}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX_SIZE:-2g}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE_SIZE:-2g}"
      TZ: America/Sao_Paulo
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/conf:/conf
      - ./neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      NEO4J_QUERY_TIMEOUT_SECONDS: "${NEO4J_QUERY_TIMEOUT_SECONDS:-120}"
      NEO4J_MAX_CONNECTION_POOL_SIZE: "${NEO4J_MAX_CONNECTION_POOL_SIZE:-20}"
      API_PORT: "${API_PORT:-8000}"
      API_WORKERS: "${API_WORKERS:-4}"
      API_THREADS: "${API_THREADS:-1}"
      API_TIMEOUT_SECONDS: "${API_TIMEOUT_SECONDS:-120}"
      CACHE_ENABLED: "${CACHE_ENABLED:-1}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      CACHE_DEFAULT_TTL_SECONDS: "${CACHE_DEFAULT_TTL_SECONDS:-60}"
      SLOW_QUERY_THRESHOLD_SECONDS: "${SLOW_QUERY_THRESHOLD_SECONDS:-2.0}"
      TZ: America/Sao_Paulo
    volumes:
      - ./api:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: etl
    restart: "no"
    profiles: ["etl"]
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      CHUNK_SIZE: "${CHUNK_SIZE:-200000}"
      WORKERS: "${WORKERS:-4}"
      NEO4J_BATCH: "${NEO4J_BATCH:-2000}"
      PIPELINE_WORKERS: "${PIPELINE_WORKERS:-2}"
      GDS_PROFILE: "${GDS_PROFILE:-auto}"
      GDS_MAX_MEMORY_GB: "${GDS_MAX_MEMORY_GB:-4.0}"
      GDS_BETWEENNESS_SAMPLING_SIZE: "${GDS_BETWEENNESS_SAMPLING_SIZE:-1000}"
      TZ: America/Sao_Paulo
    volumes:
      - ./etl:/app
      - ./etl/data:/app/data
    shm_size: "8gb"

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
