services:

  # ── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: daberto-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser  → http://localhost:7474
      - "7687:7687"   # Bolt     → bolt://localhost:7687
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}"
      NEO4J_PLUGINS: '["apoc"]'
      TZ: America/Sao_Paulo
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/conf:/conf
      - ./neo4j/plugins:/plugins
      - ./neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── ETL ────────────────────────────────────────────────────────────────────
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: daberto-etl
    restart: "no"          # não reinicia automaticamente
    profiles: ["etl"]      # só sobe se chamado explicitamente
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI:      "bolt://neo4j:7687"
      NEO4J_USER:     "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      TZ: America/Sao_Paulo
      CHUNK_SIZE:     "${CHUNK_SIZE:-100000}"
      WORKERS:        "${WORKERS:-2}"
    volumes:
      - ./data:/data             # monta data/ do host em /data no container
    # CMD padrão = "run" (download + pipeline tudo)
    # Sobrescreva com: docker compose run --rm etl download ibge
    #                  docker compose run --rm etl pipeline ibge
    #                  docker compose run --rm etl run ibge

volumes:
  neo4j_data:
  neo4j_logs: