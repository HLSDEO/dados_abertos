<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Perfil DABERTO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; padding: 20px; max-width: 1400px; margin: auto; background: #fdfdfd; }
        
        .caixa-dados { background: #eee; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 150px; overflow: auto; margin-bottom: 15px; }
        
        #controles { margin-bottom: 15px; display: flex; gap: 15px; align-items: center; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; background: #0056b3; color: #fff; font-weight: bold; }
        button:hover { background: #004494; }
        
        .checkbox-container { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; font-weight: bold; color: #333; }
        #status-msg { font-size: 14px; color: #666; margin-left: auto; }

        #caixa-grafo, #caixa-grafo-3d { 
            width: 100%; 
            height: calc(100vh - 270px);
            min-height: 400px;
            border: 1px solid #ccc; 
            border-radius: 8px; 
            background: #fff; 
            position: relative; 
            overflow: hidden; 
        }
        #caixa-grafo-3d { display: none; background-color: #050505; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration:none; color:#0056b3;">← Nova busca</a>
    <h2 id="titulo-nome" style="margin: 10px 0;">Carregando perfil...</h2>
    
    <div id="dados-raw" class="caixa-dados">Aguarde processamento...</div>

    <div id="controles">
        <button onclick="alternarVisao()" id="btn-visao">Mudar para 3D</button>
        
        <label class="checkbox-container">
            <input type="checkbox" id="check-rotulos" checked onchange="alternarRotulos()">
            Exibir Nomes
        </label>
        
        <button onclick="centralizarGrafo()" style="background: #6c757d;">Centralizar (Fit)</button>
        <span id="status-msg">Clique em uma bolinha para expandir.</span>
    </div>

    <div id="caixa-grafo"></div>
    <div id="caixa-grafo-3d"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const tipoInicial = params.get('tipo');
        const idInicial = params.get('id');
        const idRaiz = `${tipoInicial}:${idInicial}`; 

        let modo = "2D";
        let grafoData = { nodes: [], links: [] };
        let cy = null;
        let graph3d = null;
        let isInitialLoad = true;

        const cores = {
            'Raiz': '#e6194B',
            'Pessoa': '#1f77b4',
            'Empresa': '#ff7f0e',
            'Partido': '#911eb4',
            'Municipio': '#2ca02c',
            'Estado': '#8c564b',
            'Sancao': '#000000',
            'default': '#7f7f7f'
        };

        function processarResposta(data) {
            const novosNodes = data.nodes.map(n => {
                const isRoot = (n.uid === idRaiz); 
                
                // MÁSCARA UX MELHORADA: Busca profunda nas propriedades brutas se o nome vier vazio
                let nomeTratado = n.nome || (n.props ? (n.props.nome || n.props.razao_social || n.props.nome_urna || n.props.sigla) : null);
                
                // Fallback para exibir o ID ou "S/N" caso não exista nenhum nome associado
                if (!nomeTratado || String(nomeTratado).trim() === "") {
                    if (n.uid.startsWith("eid:")) {
                        nomeTratado = `[ ${n.label} S/N ]`; 
                    } else {
                        const partes = String(n.uid).split(':');
                        nomeTratado = partes.length > 1 ? partes[1] : n.uid;
                    }
                }

                return {
                    id: n.uid,
                    label: n.label,
                    nome: String(nomeTratado), // Garante formato de texto para não falhar no 3D
                    color: isRoot ? cores['Raiz'] : (cores[n.label] || cores['default']),
                    isRoot: isRoot,
                    tamanho2D: isRoot ? 60 : 25, 
                    tamanho3D: isRoot ? 12 : 4   
                };
            });

            const novosLinks = data.edges.map(e => ({
                source: e.source,
                target: e.target,
                type: e.type
            }));

            // Adiciona de forma segura, SEM sobrescrever a Raiz com IDs nulos
            novosNodes.forEach(n => {
                let existente = grafoData.nodes.find(ex => ex.id === n.id);
                if (!existente) {
                    grafoData.nodes.push(n);
                }
            });
            novosLinks.forEach(l => {
                if (!grafoData.links.find(e => e.source === l.source && e.target === l.target)) grafoData.links.push(l);
            });
        }

        async function expandirConexoes(label, id) {
            document.getElementById('status-msg').innerText = "Buscando conexões...";
            try {
                const resp = await fetch(`http://localhost:8000/graph/expand?label=${label}&id=${id}`);
                if (!resp.ok) throw new Error("Falha na API");
                const data = await resp.json();
                
                processarResposta(data);
                
                if (data.nodes.length === 0) {
                    document.getElementById('status-msg').innerText = "Aviso: Sem vizinhos encontrados.";
                } else {
                    document.getElementById('status-msg').innerText = data.meta?.is_supernode ? 
                        "Aviso: Supernó detectado (limite aplicado para não travar)." : "Conexões atualizadas.";
                }
            } catch (err) {
                document.getElementById('status-msg').innerText = "Nenhuma conexão nova encontrada ou erro de rede.";
            } finally {
                // Renderização garantida
                if (modo === "2D") {
                    renderizar2D();
                } else {
                    if (graph3d) {
                        graph3d.graphData(grafoData);
                    } else {
                        renderizar3D();
                    }
                }
            }
        }

        function alternarRotulos() {
            const exibir = document.getElementById('check-rotulos').checked;
            if (modo === "2D" && cy) {
                cy.style().selector('node').style('text-opacity', exibir ? 1 : 0).update();
            } else if (modo === "3D" && graph3d) {
                graph3d.nodeThreeObject(graph3d.nodeThreeObject());
            }
        }

        function centralizarGrafo() {
            if (modo === "2D" && cy) cy.fit(null, 50);
            if (modo === "3D" && graph3d) graph3d.zoomToFit(600, 40); 
        }

        function renderizar2D() {
            document.getElementById('caixa-grafo').style.display = 'block';
            document.getElementById('caixa-grafo-3d').style.display = 'none';

            const exibirRotulos = document.getElementById('check-rotulos').checked ? 1 : 0;

            cy = cytoscape({
                container: document.getElementById('caixa-grafo'),
                elements: [
                    ...grafoData.nodes.map(n => ({ data: { id: n.id, label: n.nome, color: n.color, tamanho: n.tamanho2D, isRoot: n.isRoot } })),
                    ...grafoData.links.map(l => ({ data: { source: l.source, target: l.target } }))
                ],
                style: [
                    { 
                        selector: 'node', 
                        style: { 
                            'label': 'data(label)', 
                            'background-color': 'data(color)', 
                            'width': 'data(tamanho)',          
                            'height': 'data(tamanho)',
                            'color': '#222', 
                            'font-size': '11px', 
                            'font-weight': 'bold',
                            'text-opacity': exibirRotulos,
                            'border-width': evt => evt.data('isRoot') ? 5 : 1, 
                            'border-color': evt => evt.data('isRoot') ? '#800000' : '#ffffff' 
                        } 
                    },
                    { 
                        selector: 'edge', 
                        style: { 'width': 1.5, 'line-color': '#bbb', 'curve-style': 'bezier' } 
                    }
                ],
                layout: { name: 'cose', animate: true, fit: true, padding: 50 }
            });

            cy.on('layoutstop', () => cy.fit(null, 50));

            cy.on('tap', 'node', (evt) => {
                const node = evt.target.data();
                const [label, id] = node.id.split(':');
                expandirConexoes(label, id);
            });
        }

        function renderizar3D() {
            document.getElementById('caixa-grafo').style.display = 'none';
            const container3d = document.getElementById('caixa-grafo-3d');
            container3d.style.display = 'block';

            setTimeout(() => {
                const w = container3d.clientWidth;
                const h = container3d.clientHeight;

                if (!graph3d) {
                    graph3d = ForceGraph3D()(container3d)
                        .width(w) 
                        .height(h) 
                        .graphData(grafoData)
                        .nodeLabel('nome') 
                        .nodeColor('color')
                        .nodeVal('tamanho3D') 
                        .nodeThreeObjectExtend(true)
                        .nodeThreeObject(node => {
                            const exibir = document.getElementById('check-rotulos').checked;
                            if (!exibir) return null;

                            const sprite = new SpriteText(node.nome);
                            sprite.color = node.isRoot ? '#ffffff' : '#dddddd'; 
                            sprite.textHeight = node.isRoot ? 6 : 3; 
                            sprite.position.y = node.isRoot ? -12 : -6; 
                            return sprite;
                        })
                        .onNodeClick(node => {
                            const [label, id] = node.id.split(':');
                            expandirConexoes(label, id);
                        });

                    graph3d.d3Force('charge').strength(-600); 
                    graph3d.d3Force('link').distance(90);     
                    
                    graph3d.onEngineStop(() => {
                        if (isInitialLoad) {
                            setTimeout(() => {
                                graph3d.zoomToFit(1000, 40); 
                            }, 1000);
                            isInitialLoad = false;
                        }
                    });
                } else {
                    graph3d.width(w).height(h);
                }
            }, 50);
        }

        function alternarVisao() {
            modo = modo === "2D" ? "3D" : "2D";
            document.getElementById('btn-visao').innerText = modo === "2D" ? "Mudar para 3D" : "Mudar para 2D";
            
            if (modo === "3D" && !graph3d) isInitialLoad = true; 
            
            modo === "2D" ? renderizar2D() : renderizar3D();
        }

        async function init() {
            const rotasComPerfil = ['Pessoa', 'Empresa', 'Parlamentar'];
            let nomeParaORaiz = idInicial; 

            if (rotasComPerfil.includes(tipoInicial)) {
                try {
                    const respPerfil = await fetch(`http://localhost:8000/${tipoInicial.toLowerCase()}/${idInicial}`);
                    if (respPerfil.ok) {
                        const perfil = await respPerfil.json();
                        nomeParaORaiz = perfil.perfil?.nome || perfil.perfil?.razao_social || idInicial;
                        document.getElementById('titulo-nome').innerText = nomeParaORaiz;
                        document.getElementById('dados-raw').innerText = JSON.stringify(perfil, null, 2);
                    } else {
                        throw new Error("Perfil não encontrado");
                    }
                } catch (err) {
                    document.getElementById('titulo-nome').innerText = nomeParaORaiz;
                    document.getElementById('dados-raw').innerText = "Detalhes não disponíveis. Exibindo apenas o grafo.";
                }
            } else {
                document.getElementById('titulo-nome').innerText = nomeParaORaiz;
                document.getElementById('dados-raw').innerText = `Detalhes estruturados não mapeados para o tipo [${tipoInicial}]. Exibindo conexões visuais do grafo abaixo.`;
            }

            if (!grafoData.nodes.find(n => n.id === idRaiz)) {
                grafoData.nodes.push({
                    id: idRaiz,
                    label: tipoInicial,
                    nome: nomeParaORaiz,
                    color: cores['Raiz'],
                    isRoot: true,
                    tamanho2D: 60,
                    tamanho3D: 12
                });
            }

            await expandirConexoes(tipoInicial, idInicial);
        }

        init();
    </script>
</body>
</html>
