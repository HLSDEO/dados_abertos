<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DABERTO — Inteligência Cívica</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0a0c0f;
    --bg2:       #111418;
    --bg3:       #181d23;
    --border:    #1f2730;
    --border2:   #2a3540;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --accent:    #00e5ff;
    --accent2:   #ff6b35;
    --green:     #00ff94;
    --yellow:    #ffd60a;
    --red:       #ff3860;
    --purple:    #b48ead;

    --label-pessoa:      #00ff94;
    --label-empresa:     #00e5ff;
    --label-parlamentar: #ffd60a;
    --label-sancao:      #ff3860;
    --label-emenda:      #b48ead;
    --label-servidor:    #ff6b35;
    --label-partido:     #64748b;
    --label-municipio:   #94a3b8;
    --label-contrato:    #38bdf8;
    --label-default:     #475569;

    --font-display: 'Syne', sans-serif;
    --font-mono:    'Space Mono', monospace;
    --font-body:    'DM Sans', sans-serif;

    --r: 6px;
    --r2: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LAYOUT ── */
  .layout { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    height: 56px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* ── LOGO ── */
  .logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo-mark {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }
  .logo-mark span { color: var(--accent); }
  .logo-sub {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── NAV ── */
  .nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
  .nav-section { margin-bottom: 20px; }
  .nav-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 10px;
    margin-bottom: 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--r);
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    transition: all .15s;
    border: 1px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: rgba(0,229,255,.08);
    color: var(--accent);
    border-color: rgba(0,229,255,.15);
  }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; }

  /* ── SEARCH BAR ── */
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 600px;
  }
  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 10px 14px 10px 40px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }
  .search-results {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--r2);
    box-shadow: var(--shadow);
    z-index: 100;
    max-height: 400px;
    overflow-y: auto;
  }
  .search-result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    cursor: pointer;
    transition: background .1s;
    border-bottom: 1px solid var(--border);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg3); }
  .search-result-nome { font-weight: 500; font-size: 13px; }
  .search-result-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .search-result-score {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .search-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }
  .search-loading { padding: 16px; text-align: center; }

  /* ── BADGE / TAG ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* ── CARDS ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 20px;
  }
  .card-sm { padding: 14px 16px; }
  .card-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── GRID ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }

  /* ── STAT BLOCK ── */
  .stat-block { display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--muted); }

  /* ── TABLE ── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }
  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(255,255,255,.02); }
  .data-table .mono { font-family: var(--font-mono); font-size: 11px; }

  /* ── RISK CARD ── */
  .risk-card {
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
    transition: border-color .15s;
  }
  .risk-card.triggered { border-color: rgba(255,56,96,.3); }
  .risk-card.triggered.medium { border-color: rgba(255,107,53,.3); }
  .risk-card.triggered.low { border-color: rgba(255,214,10,.3); }
  .risk-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--bg3);
    cursor: pointer;
  }
  .risk-title { font-weight: 500; font-size: 13px; flex: 1; }
  .risk-body { padding: 12px 16px; border-top: 1px solid var(--border); }
  .risk-evidence-item {
    display: flex;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .risk-evidence-item:last-child { border-bottom: none; }
  .risk-tipo { font-family: var(--font-mono); font-size: 10px; color: var(--muted); flex-shrink: 0; width: 80px; }

  /* ── GRAPH CANVAS ── */
  .graph-container {
    position: relative;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
  }
  .graph-canvas { width: 100%; height: 480px; display: block; }
  .graph-controls {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .graph-btn {
    width: 32px;
    height: 32px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
  }
  .graph-btn:hover { background: var(--bg3); }
  .graph-legend {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(10,12,15,.85);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 10px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    max-width: 420px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .graph-tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 8px 12px;
    font-size: 12px;
    box-shadow: var(--shadow);
    z-index: 10;
    max-width: 240px;
  }
  .graph-tooltip-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .graph-tooltip-name { font-weight: 600; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
  }
  .section-count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* ── PAGE HEADER ── */
  .page-header {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .page-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .page-title {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .page-sub { color: var(--muted); margin-top: 6px; font-size: 14px; }

  /* ── MONO VALUE ── */
  .mono { font-family: var(--font-mono); }
  .mono-sm { font-family: var(--font-mono); font-size: 11px; }

  /* ── MISC ── */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .muted { color: var(--muted); }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* ── HOME ── */
  .home-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px 40px;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .hero-title span { color: var(--accent); }
  .hero-sub { color: var(--muted); font-size: 16px; max-width: 480px; line-height: 1.6; }
  .hero-search {
    margin: 32px 0;
    width: 100%;
    max-width: 560px;
    position: relative;
  }
  .hero-search-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px 20px 16px 52px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .hero-search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,.1);
  }
  .hero-search-input::placeholder { color: var(--muted); }
  .hero-search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    color: var(--muted);
  }

  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 8px;
  }
  .stats-row-item { text-align: center; }
  .stats-row-num {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .stats-row-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .quick-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 32px;
  }
  .quick-link {
    padding: 8px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .quick-link:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── CHIP ── */
  .chip {
    display: inline-flex; align-items: center;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    border: 1px solid currentColor;
    opacity: .85;
  }

  /* ── PROGRESS ── */
  .progress-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--border2);
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .4s ease;
  }

  /* ── API DEMO banner ── */
  .api-banner {
    background: linear-gradient(135deg, rgba(0,229,255,.06), rgba(180,142,173,.06));
    border: 1px solid var(--border2);
    border-radius: var(--r2);
    padding: 14px 18px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── EMPTY STATE ── */
  .empty-state { padding: 40px; text-align: center; color: var(--muted); }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .hero-title { font-size: 36px; }
    .stats-row { gap: 16px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── CONFIG ─────────────────────────────────────── */
const API_BASE = 'http://localhost:8000';

/* ── LABEL COLORS ─────────────────────────────── */
const LABEL_COLOR = {
  Pessoa:      '#00ff94',
  Empresa:     '#00e5ff',
  Parlamentar: '#ffd60a',
  Sancao:      '#ff3860',
  Emenda:      '#b48ead',
  Servidor:    '#ff6b35',
  Partido:     '#64748b',
  Municipio:   '#94a3b8',
  Estado:      '#94a3b8',
  Contrato:    '#38bdf8',
  DividaAtiva: '#ff3860',
  Emprestimo:  '#10b981',
  Despesa:     '#f59e0b',
  Fornecedor:  '#00e5ff',
  default:     '#475569',
};

  Contrato: '📄', DividaAtiva: '💸', Emprestimo: '🏦', Despesa: '🧾',

const RISK_COLOR = { high: '#ff3860', medium: '#ff6b35', low: '#ffd60a' };
const RISK_LABEL = { high: 'ALTO', medium: 'MÉDIO', low: 'BAIXO' };

/* ── UTILS ─────────────────────────────────────── */
const fmt = (v) => v == null ? '—' : Number(v).toLocaleString('pt-BR');
const fmtBRL = (v) => v == null ? '—' : Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtDate = (s) => { if (!s) return '—'; const d = new Date(s); return isNaN(d) ? s : d.toLocaleDateString('pt-BR'); };
const maskCPF = (c) => { if (!c) return '—'; const s = String(c).replace(/\D/g,'').padStart(11,'0'); return `${s.slice(0,3)}.${s.slice(3,6)}.${s.slice(6,9)}-${s.slice(9)}`; };
const maskCNPJ = (c) => { if (!c) return '—'; const s = String(c).replace(/\D/g,'').padStart(14,'0'); return `${s.slice(0,2)}.${s.slice(2,5)}.${s.slice(5,8)}/${s.slice(8,12)}-${s.slice(12)}`; };

async function apiFetch(path) {
  try {
    const r = await fetch(API_BASE + path);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    throw e;
  }
}

/* ── MOCK DATA (usado quando API não está disponível) ── */

      { label: 'Empresa', nome: 'CONSTRUTORA LITORAL NORDESTE LTDA', id: '12345678', cnpj_basico: '12345678', score: 5.12 },
    ]
  },
  empresa: {
    empresa: { cnpj_basico: '12345678', razao_social: 'CONSTRUTORA LITORAL NORDESTE LTDA', situacao_cadastral: 'ATIVA', uf: 'PE', cnae_principal_desc: 'Construção de Edifícios', capital_social: 850000, data_inicio_atividade: '2012-03-15' },
    socios_pf: [
      { nome: 'ROBERTO CARLOS LIMA', cpf: '98765432100', qualificacao: 'Sócio-Administrador', data_entrada: '2012-03-15' },
      { nome: 'ANA PAULA SOUZA', cpf: '11122233344', qualificacao: 'Sócia', data_entrada: '2015-07-01' },
    ],

/* ── GRAPH CANVAS (Canvas 2D puro, sem deps externas) ─ */
function GraphCanvas({ nodes, edges, onNodeClick }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({ positions: {}, dragging: null, offset: {x:0,y:0}, hover: null, scale: 1, panX: 0, panY: 0 });
  const animRef = useRef(null);
  const tooltipRef = useRef(null);
  const [tooltip, setTooltip] = useState(null);

  useEffect(() => {
    if (!nodes.length) return;
    const st = stateRef.current;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2;

    // Force-directed layout init
    const pos = {};
    nodes.forEach((n, i) => {
      const angle = (i / nodes.length) * Math.PI * 2;
      const r = Math.min(W, H) * 0.3;
      pos[n.uid] = { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r, vx: 0, vy: 0 };
    });

    // Simple force simulation
    let iter = 0;
    function simulate() {
      if (iter++ > 120) { draw(); return; }
      const k = 80;
      // repulsion
      nodes.forEach(a => {
        nodes.forEach(b => {
          if (a.uid === b.uid) return;
          const dx = pos[a.uid].x - pos[b.uid].x;
          const dy = pos[a.uid].y - pos[b.uid].y;
          const d = Math.sqrt(dx*dx + dy*dy) || 1;
          const f = (k*k) / d;
          pos[a.uid].vx += dx/d * f * 0.1;
          pos[a.uid].vy += dy/d * f * 0.1;
        });
      });
      // attraction
      edges.forEach(e => {
        const s = pos[e.source], t = pos[e.target];
        if (!s || !t) return;
        const dx = t.x - s.x, dy = t.y - s.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        const f = (d - k) / d * 0.05;
        s.vx += dx * f; s.vy += dy * f;
        t.vx -= dx * f; t.vy -= dy * f;
      });
      // gravity
      nodes.forEach(n => {
        pos[n.uid].vx += (cx - pos[n.uid].x) * 0.002;
        pos[n.uid].vy += (cy - pos[n.uid].y) * 0.002;
      });
      // integrate
      nodes.forEach(n => {
        pos[n.uid].x += pos[n.uid].vx *= 0.85;
        pos[n.uid].y += pos[n.uid].vy *= 0.85;
      });
      st.positions = pos;
      draw();
      animRef.current = requestAnimationFrame(simulate);
    }
    st.positions = pos;
    simulate();
    return () => cancelAnimationFrame(animRef.current);
  }, [nodes, edges]);

  function draw() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const st = stateRef.current;
    const pos = st.positions;

    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(st.panX, st.panY);
    ctx.scale(st.scale, st.scale);

    // edges
    edges.forEach(e => {
      const s = pos[e.source], t = pos[e.target];
      if (!s || !t) return;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(t.x, t.y);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // edge label
      const mx = (s.x+t.x)/2, my = (s.y+t.y)/2;
      ctx.fillStyle = 'rgba(100,116,139,0.7)';
      ctx.font = '9px Space Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(e.type, mx, my - 4);
    });

    // nodes
    nodes.forEach(n => {
      const p = pos[n.uid];
      if (!p) return;
      const color = LABEL_COLOR[n.label] || LABEL_COLOR.default;
      const isHover = st.hover === n.uid;
      const r = isHover ? 14 : 11;

      // glow
      if (isHover) {
        const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,30);
        grad.addColorStop(0, color + '33');
        grad.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(p.x, p.y, 30, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.fillStyle = color + (isHover ? 'ff' : 'cc');
      ctx.fill();
      ctx.strokeStyle = isHover ? '#fff' : color;
      ctx.lineWidth = isHover ? 2 : 1;
      ctx.stroke();

      // label
      ctx.fillStyle = '#e2e8f0';
      ctx.font = `${isHover ? 'bold ' : ''}11px DM Sans, sans-serif`;
      ctx.textAlign = 'center';
      const name = (n.nome || n.razao_social || n.label || '').substring(0,20);
      ctx.fillText(name, p.x, p.y + r + 13);
    });

    ctx.restore();
  }

  function getNodeAt(ex, ey) {
    const st = stateRef.current;
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const mx = (ex - rect.left - st.panX) / st.scale;
    const my = (ey - rect.top - st.panY) / st.scale;
    const pos = st.positions;
    return nodes.find(n => {
      const p = pos[n.uid];
      if (!p) return false;
      const dx = mx - p.x, dy = my - p.y;
      return Math.sqrt(dx*dx + dy*dy) < 14;
    });
  }

  const handleMouseMove = useCallback((e) => {
    const st = stateRef.current;
    if (st.dragging) {
      const canvas = canvasRef.current;
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left - st.panX) / st.scale;
      const my = (e.clientY - rect.top - st.panY) / st.scale;
      st.positions[st.dragging].x = mx;
      st.positions[st.dragging].y = my;
      draw();
      return;
    }
    const n = getNodeAt(e.clientX, e.clientY);
    const prev = st.hover;
    st.hover = n ? n.uid : null;
    if (st.hover !== prev) draw();
    if (n) {
      setTooltip({ node: n, x: e.clientX, y: e.clientY });
    } else {
      setTooltip(null);
    }
  }, [nodes, edges]);

  const handleMouseDown = useCallback((e) => {
    const n = getNodeAt(e.clientX, e.clientY);
    if (n) stateRef.current.dragging = n.uid;
  }, [nodes]);

  const handleMouseUp = useCallback((e) => {
    const st = stateRef.current;
    if (st.dragging) {
      const n = nodes.find(x => x.uid === st.dragging);
      if (n) onNodeClick && onNodeClick(n);
    }
    st.dragging = null;
  }, [nodes, onNodeClick]);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    const st = stateRef.current;
    st.scale = Math.max(0.3, Math.min(3, st.scale * (e.deltaY > 0 ? 0.9 : 1.1)));
    draw();
  }, []);

  function resetView() {
    stateRef.current.scale = 1;
    stateRef.current.panX = 0;
    stateRef.current.panY = 0;
    draw();
  }

  const legendEntries = useMemo(() => {
    const seen = new Set();
    return nodes.filter(n => { if (seen.has(n.label)) return false; seen.add(n.label); return true; });
  }, [nodes]);

  return (
    <div className="graph-container">
      <canvas
        ref={canvasRef}
        className="graph-canvas"
        width={900} height={480}
        onMouseMove={handleMouseMove}
        onMouseDown={handleMouseDown}
        onMouseUp={handleMouseUp}
        onWheel={handleWheel}
        style={{ cursor: stateRef.current.hover ? 'pointer' : 'default' }}
      />
      <div className="graph-controls">
        <button className="graph-btn" onClick={resetView} title="Resetar vista">⊙</button>
        <button className="graph-btn" onClick={() => { stateRef.current.scale = Math.min(3, stateRef.current.scale * 1.2); draw(); }} title="Zoom in">+</button>
        <button className="graph-btn" onClick={() => { stateRef.current.scale = Math.max(0.3, stateRef.current.scale * 0.8); draw(); }} title="Zoom out">−</button>
      </div>
      <div className="graph-legend">
        {legendEntries.map(n => (
          <div key={n.label} className="legend-item">
            <div className="legend-dot" style={{ background: LABEL_COLOR[n.label] || LABEL_COLOR.default }} />
            {n.label}
          </div>
        ))}
      </div>
      {tooltip && (
        <div className="graph-tooltip" style={{ left: tooltip.x + 14, top: tooltip.y - 10, position: 'fixed' }}>
          <div className="graph-tooltip-label">{tooltip.node.label}</div>
          <div className="graph-tooltip-name">{tooltip.node.nome || tooltip.node.razao_social}</div>
          {tooltip.node.cpf_cnpj && <div style={{ fontFamily: 'Space Mono', fontSize: 10, color: '#64748b', marginTop: 2 }}>{tooltip.node.cpf_cnpj}</div>}
        </div>
      )}
    </div>
  );
}

    if (q.length < 2) { setResults(null); return; }
    clearTimeout(timer.current);
    timer.current = setTimeout(async () => {
      setLoading(true);
      try {
        const data = await apiFetch(`/search?q=${encodeURIComponent(q)}&limit=8`);
        setResults(data.items);
      } catch {
        setResults(MOCK.search.items);
      } finally { setLoading(false); }

    setQ(''); setResults(null);

  return (
    <div className="search-wrap" ref={ref}>

      <input className="search-input" placeholder={placeholder} value={q} onChange={e => setQ(e.target.value)} />

        <div className="search-results">

          <span style={{ color: '#64748b', fontSize: 12 }}>Nenhuma ocorrência detectada para este padrão.</span>
        </div>

  );
}

/* ── PAGE: BUSCA AVANÇADA ──────────────────────── */
function PageBusca({ onSelect }) {
  const [q, setQ] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [searched, setSearched] = useState(false);

  async function doSearch() {
    if (q.length < 2) return;
    setLoading(true); setSearched(true);
    try {
      const data = await apiFetch(`/search?q=${encodeURIComponent(q)}&limit=30`);
      setResults(data.items);
    } catch { setResults(MOCK.search.items); }
    finally { setLoading(false); }
  }

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">Busca Avançada</div>
        <div className="page-sub">Pesquise em todos os tipos de entidade do grafo</div>
      </div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 24 }}>
        <div className="search-wrap" style={{ maxWidth: '100%', flex: 1 }}>
          <span className="search-icon">🔍</span>
          <input
            className="search-input"
            placeholder="CPF, CNPJ, nome, código de emenda..."
            value={q}
            onChange={e => setQ(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && doSearch()}
            style={{ fontSize: 15, padding: '12px 14px 12px 42px' }}
          />
        </div>
        <button
          onClick={doSearch}
          style={{ background: 'var(--accent)', color: '#000', border: 'none', borderRadius: 'var(--r2)', padding: '0 24px', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}
        >BUSCAR</button>
      </div>

      {loading && <div style={{ textAlign: 'center', padding: 40 }}><span className="spinner" /></div>}

      {!loading && searched && results.length === 0 && (
        <div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-title">Nenhum resultado</div><div>Tente outro termo de busca</div></div>
      )}

      {!loading && results.length > 0 && (
        <div className="card">
          <div className="card-title">{results.length} resultados</div>
          {results.map((item, i) => (
            <div key={i} className="search-result-item" style={{ borderRadius: 6 }} onClick={() => onSelect(item)}>
              <LabelBadge label={item.label} />
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{item.nome}</div>
                <div className="mono-sm" style={{ color: 'var(--muted)', marginTop: 2 }}>{item.cpf || item.cnpj_basico || item.id}</div>
              </div>
              <span className="mono-sm" style={{ color: 'var(--muted)' }}>score {item.score?.toFixed(2)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

          <div style={{ gridColumn: 'span 2' }}>
            <div className="mono-sm" style={{ color: 'var(--muted)', marginBottom: 4 }}>ID / CPF / CNPJ</div>
            <input value={id} onChange={e => setId(e.target.value)} onKeyDown={e => e.key==='Enter'&&expand()} placeholder="Ex: 12345678 (cnpj_basico)" style={{ width: '100%', background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 'var(--r)', padding: '9px 10px', color: 'var(--text)', fontFamily: 'var(--font-body)', fontSize: 13 }} />
          </div>
          <div>
            <div className="mono-sm" style={{ color: 'var(--muted)', marginBottom: 4 }}>PROFUNDIDADE</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {[1,2].map(h => (
                <button key={h} onClick={() => setHops(h)} style={{ flex: 1, padding: '9px 0', background: hops===h ? 'rgba(0,229,255,.15)' : 'var(--bg3)', border: `1px solid ${hops===h?'var(--accent)':'var(--border)'}`, borderRadius: 'var(--r)', color: hops===h?'var(--accent)':'var(--muted)', cursor: 'pointer', fontFamily: 'var(--font-display)', fontWeight: 700 }}>{h}</button>
              ))}
            </div>
          </div>
        </div>
        <button onClick={expand} style={{ marginTop: 12, background: 'var(--accent)', color: '#000', border: 'none', borderRadius: 'var(--r)', padding: '10px 24px', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>
          {loading ? '⟳ Carregando...' : '⬡ Expandir Grafo'}
        </button>
      </div>

      {graph && (
        <div className="stack">
          <GraphCanvas nodes={graph.nodes} edges={graph.edges} onNodeClick={setSelected} />
          <div className="grid-2">
            <div className="card card-sm">
              <div className="mono-sm" style={{ color: 'var(--muted)', marginBottom: 6 }}>ESTATÍSTICAS</div>
              <div style={{ display: 'flex', gap: 20 }}>
                <div><span className="mono" style={{ color: 'var(--accent)', fontSize: 20, fontWeight: 700 }}>{graph.nodes.length}</span><div className="mono-sm" style={{ color: 'var(--muted)' }}>nós</div></div>
                <div><span className="mono" style={{ color: 'var(--purple)', fontSize: 20, fontWeight: 700 }}>{graph.edges.length}</span><div className="mono-sm" style={{ color: 'var(--muted)' }}>arestas</div></div>
              </div>
            </div>
            {selected && (
              <div className="card card-sm fade-in">
                <div className="mono-sm" style={{ color: 'var(--muted)', marginBottom: 6 }}>NÓ SELECIONADO</div>
                <LabelBadge label={selected.label} />
                <div style={{ marginTop: 6, fontWeight: 600 }}>{selected.nome || selected.razao_social}</div>
                <div className="mono-sm" style={{ color: 'var(--muted)', marginTop: 2 }}>{selected.cpf_cnpj}</div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PAGE: STATUS / PIPELINES ────────────────────── */
function PageStatus() {
  const pipelines = [
    { nome: 'IBGE', status: 'loaded', rows_in: 5570, rows_out: 5570, started: '2024-01-15 08:12' },
    { nome: 'CNPJ (Receita Federal)', status: 'loaded', rows_in: 54000000, rows_out: 54000000, started: '2024-01-15 09:30' },
    { nome: 'TSE Candidatos', status: 'loaded', rows_in: 2800000, rows_out: 2800000, started: '2024-01-16 02:15' },
    { nome: 'Emendas CGU', status: 'loaded', rows_in: 1200000, rows_out: 1200000, started: '2024-01-16 11:00' },
    { nome: 'Servidores CGU', status: 'running', rows_in: 450000, rows_out: 450000, started: '2024-01-17 03:40' },
    { nome: 'Sanções CGU (CEIS/CNEP)', status: 'loaded', rows_in: 52000, rows_out: 52000, started: '2024-01-16 15:22' },
    { nome: 'PNCP Contratos', status: 'quality_fail', rows_in: 180000, rows_out: 0, started: '2024-01-17 01:10', error: 'CSV sem coluna id_contratacao_pncp' },
    { nome: 'PGFN Dívida Ativa', status: 'loaded', rows_in: 4500000, rows_out: 4500000, started: '2024-01-16 20:00' },
    { nome: 'GDS Analytics', status: 'loaded', rows_in: 58000000, rows_out: 320000, started: '2024-01-17 06:00' },
  ];

  const statusColor = { loaded: '#00ff94', running: '#ffd60a', quality_fail: '#ff3860' };
  const statusIcon = { loaded: '✅', running: '⟳', quality_fail: '❌' };

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">Status dos Pipelines</div>
        <div className="page-sub">Monitoramento dos últimos IngestionRuns do ETL</div>
      </div>
      <div className="grid-3" style={{ marginBottom: 20 }}>
        <div className="card card-sm stat-block"><div className="stat-label">Pipelines OK</div><div className="stat-value" style={{ color: 'var(--green)' }}>{pipelines.filter(p=>p.status==='loaded').length}</div></div>
        <div className="card card-sm stat-block"><div className="stat-label">Em execução</div><div className="stat-value" style={{ color: 'var(--yellow)' }}>{pipelines.filter(p=>p.status==='running').length}</div></div>
        <div className="card card-sm stat-block"><div className="stat-label">Com erro</div><div className="stat-value" style={{ color: 'var(--red)' }}>{pipelines.filter(p=>p.status==='quality_fail').length}</div></div>
      </div>
      <div className="card">
        <table className="data-table">
          <thead><tr><th>Pipeline</th><th>Status</th><th>Linhas IN</th><th>Linhas OUT</th><th>Iniciado</th></tr></thead>
          <tbody>{pipelines.map((p,i) => (
            <tr key={i}>
              <td style={{ fontWeight: 500 }}>{p.nome}</td>
              <td>
                <span className="badge" style={{ background: statusColor[p.status]+'20', color: statusColor[p.status], borderColor: statusColor[p.status]+'40' }}>
                  {statusIcon[p.status]} {p.status}
                </span>
              </td>
              <td className="mono">{fmt(p.rows_in)}</td>
              <td className="mono">{fmt(p.rows_out)}</td>
              <td className="mono-sm" style={{ color: 'var(--muted)' }}>{p.started}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div style={{ marginTop: 20 }}>
        <div className="card">
          <div className="card-title">Comando CLI equivalente</div>
          {['docker compose run --rm etl ingestion-status', 'docker compose run --rm etl pipeline cnpj --limite 10000', 'docker compose run --rm etl analytics gds'].map(cmd => (
            <div key={cmd} style={{ padding: '8px 12px', background: 'var(--bg)', borderRadius: 'var(--r)', marginBottom: 6, fontFamily: 'Space Mono', fontSize: 12, color: 'var(--accent)' }}>{cmd}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ────────────────────────────────────── */
function App() {
  const [page, setPage] = useState('home');
  const [pageParam, setPageParam] = useState(null);

  function navigate(p, param) {
    setPage(p);
    setPageParam(param || null);
  }

  function handleSelect(item) {
    if (item.label === 'Empresa') navigate('empresa', item.cnpj_basico || item.id);
    else if (item.label === 'Pessoa') navigate('pessoa', item.cpf || item.id);
    else if (item.label === 'Parlamentar') navigate('parlamentar', item.id || item.codigo_autor);
    else navigate('busca');
  }

  const navItems = [
    { key: 'home', icon: '⬡', label: 'Início' },
    { key: 'busca', icon: '🔍', label: 'Busca Avançada' },
    { key: 'grafo', icon: '🕸️', label: 'Explorador de Grafo' },
    { key: 'status', icon: '📡', label: 'Status Pipelines' },
  ];

  const renderPage = () => {
    switch(page) {
      case 'home':        return <PageHome onNavigate={(p) => navigate(p)} onSelect={handleSelect} />;
      case 'busca':       return <PageBusca onSelect={handleSelect} />;
      case 'empresa':     return <PageEmpresa cnpj={pageParam} />;
      case 'pessoa':      return <PagePessoa cpf={pageParam} />;
      case 'parlamentar': return <PageParlamentar id={pageParam} />;
      case 'grafo':       return <PageGrafo />;
      case 'status':      return <PageStatus />;
      default:            return <PageHome onNavigate={(p) => navigate(p)} onSelect={handleSelect} />;
    }
  };

  return (
    <div className="layout">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="logo">
          <div className="logo-mark">DAB<span>ERTO</span></div>
          <div className="logo-sub">Inteligência Cívica</div>
        </div>
        <nav className="nav">
          <div className="nav-section">
            <div className="nav-label">Navegação</div>
            {navItems.map(item => (
              <div key={item.key} className={`nav-item ${page===item.key?'active':''}`} onClick={() => navigate(item.key)}>
                <span className="nav-icon">{item.icon}</span>
                {item.label}
              </div>
            ))}
          </div>
          <div className="nav-section">
            <div className="nav-label">Bases de Dados</div>
            {[['ibge','📍','IBGE Localidades'],['cnpj','🏢','CNPJ / Receita Federal'],['tse','🗳️','TSE Candidatos'],['emendas','📋','Emendas CGU'],['servidores','👔','Servidores CGU'],['sancoes','⛔','Sanções CGU'],['pncp','📄','PNCP Contratos'],['pgfn','💸','PGFN Dívida Ativa'],['bndes','🏦','BNDES Empréstimos'],['camara','🏛️','Câmara CEAP'],['senado','🏛️','Senado CEAP']].map(([k,icon,l]) => (
              <div key={k} className="nav-item" style={{ fontSize: 12 }}>
                <span className="nav-icon" style={{ fontSize: 12 }}>{icon}</span>
                {l}
              </div>
            ))}
          </div>
        </nav>
        <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border)', flexShrink: 0 }}>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--muted)', lineHeight: 1.8 }}>
            <div>API: <span style={{ color: '#00e5ff' }}>localhost:8000</span></div>
            <div>Neo4j: <span style={{ color: '#00e5ff' }}>localhost:7687</span></div>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <main className="main">
        <div className="topbar">
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, color: 'var(--muted)', whiteSpace: 'nowrap' }}>
            {page === 'empresa' ? '🏢 Empresa' : page === 'pessoa' ? '👤 Pessoa' : page === 'parlamentar' ? '🏛️ Parlamentar' : ''}
          </div>
          {page !== 'home' && (
            <SearchBar onSelect={handleSelect} />
          )}
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
            <a href={API_BASE + '/docs'} target="_blank" style={{ padding: '6px 14px', background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 'var(--r)', color: 'var(--muted)', fontSize: 12, textDecoration: 'none', fontFamily: 'var(--font-mono)' }}>API Docs ↗</a>
          </div>
        </div>
        <div className="content">
          {renderPage()}
        </div>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
