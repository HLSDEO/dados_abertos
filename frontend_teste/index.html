<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Busca DABERTO</title>
    <!-- Um pouco de CSS (decoração) para deixar mais bonito -->
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input { padding: 10px; font-size: 16px; width: 300px; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; }
        ul { list-style-type: none; padding: 0; }
        li { background: #f4f4f4; margin: 5px 0; padding: 10px; border-radius: 5px; }
        .tipo { color: white; background: #0056b3; padding: 3px 8px; border-radius: 10px; font-size: 12px; margin-right: 10px;}
    </style>
</head>
<body>

    <h1>Investigador DABERTO</h1>
    <p>Busque por empresas, políticos, servidores, etc.</p>

    <!-- Nossa barra de busca e botão -->
    <input type="text" id="campo-busca" placeholder="Digite um nome (mínimo 2 letras)...">
    <button id="btn-buscar">Pesquisar</button>

    <p id="mensagem-erro" style="color: red;"></p>

    <!-- Aqui é onde a lista de resultados vai aparecer -->
    <ul id="lista-resultados"></ul>

    <script>
        // 1. Pegamos os elementos da tela (identificando pelo ID)
        const botaoBuscar = document.getElementById("btn-buscar");
        const campoBusca = document.getElementById("campo-busca");
        const listaResultados = document.getElementById("lista-resultados");
        const mensagemErro = document.getElementById("mensagem-erro");

        // Ouve as teclas digitadas dentro do campo de busca
        campoBusca.addEventListener("keypress", function(event) {
            // Verifica se a tecla pressionada foi o "Enter"
            if (event.key === "Enter") {
                event.preventDefault(); // Previne o comportamento padrão (útil se estiver num form)
                botaoBuscar.click();    // Simula programaticamente o clique no botão "Pesquisar"
            }
        });

        // 2. Dizemos para o botão "escutar" o clique
        botaoBuscar.addEventListener("click", function() {
            
            // Pegamos o texto que o usuário digitou dentro do campo
            const textoDigitado = campoBusca.value;

            // Limpamos mensagens antigas e a lista antiga antes de buscar de novo
            mensagemErro.innerText = "";
            listaResultados.innerHTML = "";

            // REGRA DA API: Verificamos se tem pelo menos 2 letras
            if (textoDigitado.length < 2) {
                mensagemErro.innerText = "Por favor, digite pelo menos 2 caracteres.";
                return; // O 'return' faz o código parar aqui e não continua.
            }

            mensagemErro.innerText = "Buscando..."; // Aviso de carregamento
            mensagemErro.style.color = "blue";

            // 3. O nosso garçom (fetch) vai até a rota /search levando a variável do texto
            fetch("http://localhost:8000/search?q=" + textoDigitado)
                .then(resposta => resposta.json()) // Transforma a resposta em JSON
                .then(dados => {
                    mensagemErro.innerText = ""; // Apaga o aviso de "Buscando..."

                    // Verifica se a API não encontrou nada
                    if (dados.items.length === 0) {
                        mensagemErro.innerText = "Nenhum resultado encontrado.";
                        mensagemErro.style.color = "orange";
                        return;
                    }

                    // 4. Se encontrou, vamos fazer um "Loop" (repetição)
                    // Para cada 'item' que veio na lista 'dados.items', faça o seguinte:
                    for (let item of dados.items) {
                        
                        // Criamos uma nova linha de lista (<li>) no HTML
                        const linha = document.createElement("li");
                        
                        // Agora criamos um link (<a>) que envia o 'tipo' e o 'id' para a página perfil.html
                        linha.innerHTML = "<a href='perfil.html?tipo=" + item.label + "&id=" + item.id + "' style='text-decoration: none; color: black;'><span class='tipo'>" + item.label + "</span> " + item.nome + "</a>";
                        
                        // Adicionamos essa linha criada dentro da nossa lista principal (<ul>)
                        listaResultados.appendChild(linha);
                    }
                })
                .catch(erro => {
                    // Se a API estiver desligada ou der erro de conexão
                    mensagemErro.innerText = "Erro ao conectar com o banco de dados.";
                    mensagemErro.style.color = "red";
                });
        });
    </script>
</body>
</html>
